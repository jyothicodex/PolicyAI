# Production Environment Settings
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Use S3 or external storage in production if implemented, otherwise rely on Render persistent disk
app.upload.dir=/data/uploads

# Remote Ollama configuration
app.ollama.base-url=${OLLAMA_URL:http://localhost:11434}

# Server port configured by Render
server.port=${PORT:8080}
